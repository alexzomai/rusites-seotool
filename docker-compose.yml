services:
  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  parser:
    build:
      context: ./parser
    depends_on:
      - backend
    env_file:
      - .env
    restart: "no"

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    command: daemon --config /etc/ofelia/config.ini
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia.ini:/etc/ofelia/config.ini:ro

  database:
    image: postgres:15
    restart: unless-stopped
    expose:
      - "5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
